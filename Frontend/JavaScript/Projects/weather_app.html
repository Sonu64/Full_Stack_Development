<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center p-2">

    <main class="bg-slate-900 border border-slate-800 text-white w-full max-w-[320px] rounded-2xl shadow-2xl overflow-hidden scale-95 sm:scale-100">
        
        <header class="p-4 pb-0">
            <h1 class="text-[10px] font-bold tracking-[0.2em] text-slate-500 uppercase mb-3 text-center">SkyScan Pro</h1>
            <div class="relative flex items-center">
                <input type="text" id="cityInput" placeholder="City name..." 
                    class="w-full bg-slate-800/50 border border-slate-700 rounded-xl py-2 px-4 text-sm outline-none focus:ring-1 focus:ring-emerald-500 transition-all placeholder:text-slate-600">
                <button id="searchBtn" class="absolute right-1.5 bg-emerald-500 hover:bg-emerald-600 text-white px-3 py-1 rounded-lg text-xs transition-colors font-bold">
                    GO
                </button>
            </div>
        </header>

        <section id="weatherDisplay" class="p-4 pt-2">
            
            <div class="text-center my-4">
                <div id="weatherIcon" class="text-5xl mb-1">🌤️</div>
                <h2 id="cityName" class="text-xl font-bold truncate px-2">---</h2>
                <div class="flex justify-center items-baseline gap-0.5">
                    <span id="temp" class="text-5xl font-black tracking-tighter">--</span>
                    <sup class="text-lg">°C</sup>
                </div>
                <p id="condition" class="text-xs text-slate-500 capitalize italic">Awaiting Signal...</p>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div class="bg-slate-800/30 p-2 rounded-xl border border-slate-800/50 flex flex-col items-center">
                    <span class="text-[9px] text-slate-500 uppercase font-black">Humidity</span>
                    <span id="humidity" class="text-sm font-bold">--%</span>
                </div>
                <div class="bg-slate-800/30 p-2 rounded-xl border border-slate-800/50 flex flex-col items-center">
                    <span class="text-[9px] text-slate-500 uppercase font-black">Wind</span>
                    <span id="wind" class="text-sm font-bold">-- <small class="text-[10px]">km/h</small></span>
                </div>
                <div class="bg-slate-800/30 p-2 rounded-xl border border-slate-800/50 flex flex-col items-center">
                    <span class="text-[9px] text-slate-500 uppercase font-black">Pressure</span>
                    <span id="pressure" class="text-sm font-bold">--</span>
                </div>
                <div class="bg-slate-800/30 p-2 rounded-xl border border-slate-800/50 flex flex-col items-center">
                    <span class="text-[9px] text-slate-500 uppercase font-black">Visibility</span>
                    <span id="visibility" class="text-sm font-bold">--</span>
                </div>
            </div>
        </section>

        <footer class="py-2 text-center border-t border-slate-800/50">
            <p id="statusMsg" class="text-[10px] text-slate-600 font-bold uppercase tracking-widest">Built with 💖 by Sonu</p>
        </footer>
    </main>

    <script>
        // Use this Mock Data function to test your DOM logic immediately!
        const API_KEY = "8313e9397d477560c4071df640d6a1fe";

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const coords = await getCoordinates();
                console.log("User's Coordinates:", coords);
                const latitude = coords.latitude;
                const longitude = coords.longitude;

                const locationConnectionString = `https://api.openweathermap.org/data/2.5/weather?lat=${latitude}&lon=${longitude}&appid=${API_KEY}&units=metric`;

                const locationData = await fetch(locationConnectionString);
                const locationJsonData = await locationData.json();
                updateWeatherDisplay(locationJsonData);

            } catch (error) {
                console.error("Error fetching coordinates:", error);
            }
        });

        async function getMockData() {
            // Replace with your actual API key
            const city = document.getElementById('cityInput').value.trim();
            if (!city) {
                alert("Please enter a city name!");
                return;
            }
            const connectionString = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`;

            const data = await fetch(connectionString)
            const jsonData = await data.json();
            if (jsonData.cod !== 200) {
                alert("City not found! Please check the name and try again.");
                updateWeatherDisplay({
                    visibility: 0,
                    wind: {
                        speed: 0
                    },
                    weather: [{
                        main: "N/A"
                    }],
                    main: {
                        pressure: 0,
                        humidity: 0,
                        temp: 0
                    },
                    name: ""
                });
            }

            return jsonData;
        }


        async function getCoordinates() {
            let latitude = -1;
            let longitude = -1;
            return new Promise((resolve, reject) => {
                if (navigator.geolocation) {
                    try {
                        navigator.geolocation.getCurrentPosition((position) => {
                            latitude = position.coords.latitude;
                            longitude = position.coords.longitude;
                            resolve({
                                latitude,
                                longitude
                            });
                        });
                    } catch (err) {
                        reject(err);
                    }
                } else {
                    reject(new Error("Geolocation is not supported by this browser."));
                }
            })
        }

        const btn = document.getElementById('searchBtn');
        btn.addEventListener('click', async () => {
            // For now, we will use mock data to test our UI
            const data = await getMockData();
            updateWeatherDisplay(data);
        });


        async function updateWeatherDisplay(data) {
            console.log(data);
            // Update the DOM elements with the fetched weather data
            document.getElementById('visibility').textContent = `${data.visibility / 1000} km`;
            document.getElementById('wind').textContent = `${data.wind.speed} km/h`;
            document.getElementById('condition').textContent = data.weather[0].main;
            document.getElementById('pressure').textContent = `${data.main.pressure} hPa`;
            document.getElementById('humidity').textContent = `${data.main.humidity}%`;
            document.getElementById('temp').innerHTML = `${Math.round(data.main.temp)}`;


            if (data.name) {
                const districtString = `https://api.postalpincode.in/postoffice/${data.name}`;
                let districtData = await fetch(districtString);
                districtData = await districtData.json();
                // If exact District can't be found, we will just show the sub-city/village name from the weather API
                // In case the API totally fails, we will show the city name from the weather API as well, that's why we wrote districtData !== undefined, to avoid the error of trying to access the Status property of an undefined variable
                if (districtData && districtData[0].Status === "Error") {
                    document.getElementById('cityInput').value = data.name;
                }
                else {
                    document.getElementById('cityInput').value = districtData[0].PostOffice[0].District;
                }
            } else {
                document.getElementById('cityInput').value = data.name;
            }
        }


    </script>
</body>
</html>
